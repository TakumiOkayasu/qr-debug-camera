[chrome]
target_url = "https://example.com"
profile_dir = ".runtime/chrome-profile"
remote_debugging_port = 9222
path = ""

[overlay]
width = 720
height = 720
border = 4
always_on_top = true
click_through = true

[camera]
width = 1280
height = 720
fps = 30
capture_fps = 15
detect_zoom_max = 0.8
device_label = "QR Debug Camera"

[qr]
log_path = "logs/qr-readings.jsonl"
timezone = "Asia/Tokyo"
encodings = ["utf-8", "cp932", "shift_jis", "euc_jp"]
dedupe_ms = 1000
exit_key = "q"
